  # 国策：苏维埃的民警
 RGEO_milicia: "苏维埃的民警"
 RGEO_milicia_desc: "在苏维埃政权的领导下，我们将组建一支兼具治安维持与基础国防职能的民警部队。他们不仅会肃清境内的土匪与反动残余，保障地方生产与民生稳定，更能在战时快速补充正规军缺口，成为捍卫苏维埃领土的第一道防线。"
  
 RGEO_NKVD: "重组NKVD"
 RGEO_NKVD_desc: "为肃清国内反动势力、防范外国间谍渗透，我们将整顿并强化秘密警察机构，保障苏维埃政权的稳固与安全。"